name: CI

on:
  pull_request:
    paths:
      - 'services/**'
      - 'frontend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore layers.slnx

      - name: Build
        run: dotnet build layers.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test layers.slnx --no-build --configuration Release
