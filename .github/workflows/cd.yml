name: CD

on:
  push:
    branches:
      - main
    paths:
      - 'services/**'
      - 'frontend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-west-2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build
        run: ./build.sh

      - name: Deploy Lambdas
        run: |
          aws lambda update-function-code --function-name layers-numbers    --zip-file fileb://build/numbers.zip
          aws lambda update-function-code --function-name layers-esme-squalor --zip-file fileb://build/esme_squalor.zip
          aws lambda update-function-code --function-name layers-orchestrator  --zip-file fileb://build/orchestrator.zip

      - name: Upload frontend
        run: |
          ORCHESTRATOR_URL=$(aws apigatewayv2 get-apis \
            --query "Items[?Name=='layers-orchestrator-api'].ApiEndpoint" \
            --output text)
          BUCKET=$(aws s3api list-buckets \
            --query "Buckets[?starts_with(Name, 'layers-frontend')].Name | [0]" \
            --output text)
          sed "s|http://localhost:5000|${ORCHESTRATOR_URL}|g" frontend/app.js > /tmp/app.js
          aws s3 cp frontend/index.html s3://${BUCKET}/
          aws s3 cp /tmp/app.js s3://${BUCKET}/app.js
