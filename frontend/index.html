<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layers</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #e8f5e9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 30px;
            text-align: center;
            color: #333;
        }

        #buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        #buttons button {
            flex: 1;
            padding: 12px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            background: #007AFF;
            color: white;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
        }

        #buttons button:hover:not(:disabled) {
            background: #0051D5;
        }

        #buttons button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #readout {
            background: #f9f9f9;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            padding: 5px 20px;
            text-align: center;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        #readout.result {
            font-size: 48px;
            font-weight: 700;
            color: #333;
        }

        #readout.loading {
            color: #666;
        }

        #readout.error {
            color: #d32f2f;
        }

        #readout.initial {
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Layers</h1>

        <div id="buttons">
            <button onclick="handleClick(1)">1</button>
            <button onclick="handleClick(2)">2</button>
            <button onclick="handleClick(3)">3</button>
        </div>

        <div id="readout" class="initial">Click a button to start</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
